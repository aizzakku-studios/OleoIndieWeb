<!DOCTYPE html 5>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="¡Esta es la página web oficial de OleoIndie! Diviértete y dónanos si te gusta nuestro canal.">
	<meta name="author" content="Aizzakku Dev">

	<title>OleoIndie</title>
	<style>
		body {
			margin-top: 280px;
			overflow-x: hidden;
			background: radial-gradient(ellipse at center, lightblue 10%, white 90%);
			min-height: 100vh;
		}
		h1 {
			margin-left: 500px;
			font-size: 100px;
		}

		h4 {
			margin-left: 670px;
			margin-top: -80px;
			font-size: 25px;
                }

		h1:hover, h4:hover, a:hover, h3:hover {
			color: Gold;
		}

		a, h3, h4, h1 {
			color: GoldenRod;
		}

		.navbar {
			 display: flex;
  			 justify-content: space-between;
	         align-items: center;
 			 position: fixed;
 			 top: 0;
 			 left: 0;
 			 width: 100%;
			 box-sizing: border-box;
 			 background: linear-gradient(to bottom, white, aliceblue);
 			 z-index: 999;
 			 padding: 0px 20px;
		}
		h1, h4 {
  animation: slideIn 1s ease-out;
}

@keyframes slideIn {
  from {
    transform: translateX(-1000px);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  		}
	}
	</style>
</head>
<body>
		<h1>OLEOINDIE</h1>
		<h4>La Página Web</h4>
		<nav class="navbar">
			<h3>OLEOINDIE</h3>

		</nav>
